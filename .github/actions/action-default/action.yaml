name: action nest action
description: |
  local action contains actions
inputs:
  foo:
    description: "foo inputs"
    required: false

runs:
  using: "composite"
  steps:
    - name: Output foo input
      shell: bash
      run: echo "foo is ${VALUE}" # redirect to env when input is empty.
      env:
        VALUE: ${{ inputs.foo != '' && inputs.foo || env.FOO }}

    - parallel:
        - run: echo foo
        - run: echo bar

    - run: echo "background"
      background: true
      id: background

    - name: wait
      wait: background
