name: pin sha
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pin-sha:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      # Don't use a tag or branch, but specify the full sha instead
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
