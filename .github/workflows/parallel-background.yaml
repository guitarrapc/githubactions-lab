name: parallel (background)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  uses-background:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
        background: true
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
        background: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
        background: true

      - name: Wait background job
        wait-all:

      - name: Build dotnet
        id: build-dotnet # case insensitive
        run: dotnet build ./src/dotnet -o publish/dotnet
        background: true

      - name: Build go
        id: build-go
        run: go build -o ../../publish/go/
        working-directory: ./src/go/
        background: true

      - name: Build go-db
        id: build-go-db
        run: go build -o ../../publish/go-db/
        working-directory: ./src/go-db/
        background: true

      - name: Check build results
        run: ls -l ./publish/
        continue-on-error: true

  cancel:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Build dotnet
        id: build-dotnet # case insensitive
        run: dotnet build ./src/dotnet -o publish/dotnet
        background: true

      - name: Build go
        id: build-go
        run: go build -o ../../publish/go/
        working-directory: ./src/go/
        background: true

      - name: Build go-db
        id: build-go-db
        run: go build -o ../../publish/go-db/
        working-directory: ./src/go-db/
        background: true

      - name: Check build results
        run: ls -l ./publish/
        continue-on-error: true

      # if not allowed
      - name: Cancel background job
        cancel: build-dotnet

      - name: Cancel background job
        cancel: build-go

      - name: Cancel background job
        cancel: build-go-db

      - name: Check build results after wait
        run: ls -lR ./publish/

  wait:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Build dotnet
        id: build-dotnet
        run: dotnet build ./src/dotnet -o publish/dotnet
        background: true

      - name: Build go
        id: build-go
        run: go build -o ../../publish/go/
        working-directory: ./src/go/
        background: true

      - name: Build go-db
        id: build-go-db
        run: go build -o ../../publish/go-db/
        working-directory: ./src/go-db/
        background: true

      - name: Check build results
        run: ls -l ./publish/
        continue-on-error: true

      # if not allowed
      - name: Wait background job
        wait: [build-dotnet]

      - name: Check build results after wait
        run: ls -lR ./publish/

  wait-all:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Build dotnet
        id: build-dotnet
        run: dotnet build ./src/dotnet -o publish/dotnet
        background: true

      - name: Build go
        id: build-go
        run: go build -o ../../publish/go/
        working-directory: ./src/go/
        background: true

      - name: Build go-db
        id: build-go-db
        run: go build -o ../../publish/go-db/
        working-directory: ./src/go-db/
        background: true

      - name: Check build results
        run: ls -l ./publish/
        continue-on-error: true

      # if not allowed
      - name: Wait for all services to stop
        wait-all:

      - name: Check build results after wait
        run: ls -lR ./publish/

  no-wait:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Build dotnet
        id: build-dotnet
        run: dotnet build ./src/dotnet -o publish/dotnet
        background: true

      - name: Build go
        id: build-go
        run: go build -o ../../publish/go/
        working-directory: ./src/go/
        background: true

      - name: Build go-db
        id: build-go-db
        run: go build -o ../../publish/go-db/
        working-directory: ./src/go-db/
        background: true

      - name: Check build results
        run: ls -l ./publish/
        continue-on-error: true

      - name: Some long running task
        run: sleep 30

      - name: Check build results after wait
        run: ls -lR ./publish/
