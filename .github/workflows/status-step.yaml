name: status step
on:
  workflow_dispatch:

jobs:
  success:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - run: echo "success"
        id: echo
      # called
      - run: echo "success() runs when none of the previous steps have failed or been canceled"
        if: ${{ success() }}
      # called
      - run: echo "always() runs even when cancelled. It runs only when a critical failure prevents the task."
        if: ${{ always() }}
      # skipped
      - run: echo "cancelled() runs when workflow is cancelled."
        if: ${{ cancelled() }}
      # skipped
      - run: echo "failure() runs when any previous step of a job fails."
        if: ${{ failure() }}
      # status=success
      - run: echo "${{ steps.echo.outcome }}"
        if: ${{ always() }}

  failure:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - run: exit 1
        id: echo
      # skipped
      - run: echo "success() runs when none of the previous steps have failed or been canceled"
        if: ${{ success() }}
      # called
      - run: echo "always() runs even when cancelled. It runs only when a critical failure prevents the task."
        if: ${{ always() }}
      # skipped
      - run: echo "cancelled() runs when workflow is cancelled."
        if: ${{ cancelled() }}
      # called
      - run: echo "failure() runs when any previous step of a job fails."
        if: ${{ failure() }}
      # status=failure
      - run: echo "status=${{ steps.echo.outcome }}"
