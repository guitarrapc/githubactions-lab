name: merge branch
on:
  workflow_dispatch:
    inputs:
      upstream:
        description: "merge from"
        required: true
        default: "main"
      branch:
        description: "merge to"
        required: true
        default: "staging"

jobs:
  merge:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      # merge main to staging
      - name: Create Pull Request
        env:
          UPSTREAM: ${{ inputs.upstream }}
          BRANCH: ${{ inputs.branch }}
          GH_TOKEN: ${{ secrets.SYNCED_GITHUB_TOKEN_REPO }} # enable github actions workflow chain. require pull_request read/write (fine grained), repo (legacy)
        run: |
          PR_TITLE="[Automate] Merge ${UPSTREAM} to ${BRANCH}"
          PR_BODY=$':crown: *An automated PR*\n\n_Created by gh cli_'
          PR_NUMBER="$(gh pr list --base "${BRANCH}" --head "${UPSTREAM}" --state open --json number --jq '.[0].number // ""')"

          if [ -n "$PR_NUMBER" ]; then
            CURRENT_TITLE="$(gh pr view "$PR_NUMBER" --json title --jq '.title')"
            CURRENT_BODY="$(gh pr view "$PR_NUMBER" --json body --jq '.body')"

            if [ "$CURRENT_TITLE" != "$PR_TITLE" ] || [ "$CURRENT_BODY" != "$PR_BODY" ]; then
              gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY" --add-label "auto-pr"
            else
              echo "PR already exists and is up-to-date"
            fi
          else
            gh pr create --base "${BRANCH}" --head "${UPSTREAM}" --title "$PR_TITLE" --body "$PR_BODY" --label "auto-pr" || echo "No changes to merge"
          fi
