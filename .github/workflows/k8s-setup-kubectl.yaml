name: setup kubectl
on:
  workflow_dispatch:

env:
  KUBECTL_VERSION: "v1.32.0"

jobs:
  setup:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - run: kubectl version --client
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: ${{ env.KUBECTL_VERSION }}
      - run: kubectl version --client
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: "latest"
      - run: kubectl version --client
