name: "action default"
on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  action:
    env:
      FOO: foo
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: setup env FOO
        run: echo "FOO=foo"  | tee -a "$GITHUB_ENV"
      - uses: ./.github/actions/action-default
