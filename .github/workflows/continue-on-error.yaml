name: "continue on error"
on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  continue-on-error:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: exit 1
        continue-on-error: true
      - run: exit 1
        continue-on-error: true
      # never call failure(), as continue-on-error treat step error as success.
      - if: ${{ failure() }}
        run: echo "error happen"
      - if: ${{ success() }}
        run: echo "continue-on-error:true overrite status with success"
      - if: ${{ always() }}
        run: echo "always trigger this step"
      # called, because of continue-on-error: true
      - run: echo success
